<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task 2 - Image Zoom </title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        padding: 50px;
    }
    .zoom-container {
        display: inline-block;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }
    #zoom-target {
        display: inline-block;
    }
</style>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-zoom/1.7.21/jquery.zoom.min.js"></script>
<script>
    $(document).ready(function(){
        $('#zoom-target').zoom({ on: 'mouseover' });
    });
</script>
</head>
<body>

    <div class="zoom-container">
        <span id="zoom-target">
            <img src="1.jpg" alt="Flowers" width="400">
        </span>
    </div>

</body>
</html>
